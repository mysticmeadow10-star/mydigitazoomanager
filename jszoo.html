<!DOCTYPE html>
<html>
<head>
  <title>My Digital Zoo Manager</title>

 
<body>

  <h1>My Digital Zoo Manager</h1>

  <p>
    Use JavaScript and the DOM to explore animals, zones, parent nodes,
    child nodes, and sibling nodes.
  </p>

  <div id="zoo">

    <div class="zone" id="lionZone">
      <h2>Lion Zone</h2>
      <p>Animal: <span class="animal">Lion</span></p>
    </div>

    <div class="zone" id="elephantZone">
      <h2>Elephant Zone</h2>
      <p>Animal: <span class="animal">Elephant</span></p>
    </div>

    <div class="zone" id="pandaZone">
      <h2>Panda Zone</h2>
      <p>Animal: <span class="animal">Panda</span></p>
    </div>

  </div>

  <button onclick="manageZoo()">Manage Zoo</button>

  <div id="output">
    Zoo information will appear here.
  </div>

  <script>
    function manageZoo() {

      
      let zoo = document.getElementById("zoo");
      let lionZone = document.getElementById("lionZone");
      let elephantZone = document.getElementById("elephantZone");
      let pandaZone = document.getElementById("pandaZone");
      let output = document.getElementById("output");

     
      let parentNodeName = lionZone.parentNode.id;

     
      let firstChildZone = zoo.children[0].id;
      let secondChildZone = zoo.children[1].id;
      let nextSiblingZone = lionZone.nextElementSibling.id;
      let previousSiblingZone = pandaZone.previousElementSibling.id;

      
      let elementNodeType = lionZone.nodeType;
      let textNodeType = lionZone.firstChild.nodeType;

      
      lionZone.style.backgroundColor = "#fff3cd";
      elephantZone.style.backgroundColor = "#d1ecf1";
      pandaZone.style.backgroundColor = "#f8d7da";

      lionZone.querySelector("h2").innerHTML = "Updated Lion Zone";
      elephantZone.querySelector("h2").innerHTML = "Updated Elephant Zone";
      pandaZone.querySelector("h2").innerHTML = "Updated Panda Zone";

      output.innerHTML =
        "<strong>DOM Tree Information:</strong><br>" +
        "Parent of Lion Zone: " + parentNodeName + "<br>" +
        "First child of Zoo: " + firstChildZone + "<br>" +
        "Second child of Zoo: " + secondChildZone + "<br><br>" +

        "<strong>Sibling Node Information:</strong><br>" +
        "Next sibling of Lion Zone: " + nextSiblingZone + "<br>" +
        "Previous sibling of Panda Zone: " + previousSiblingZone + "<br><br>" +

        "<strong>Types of Nodes:</strong><br>" +
        "Lion Zone element node type: " + elementNodeType + "<br>" +
        "Lion Zone first child text node type: " + textNodeType + "<br><br>" +

        "<strong>DOM Update:</strong><br>" +
        "The animal zone headings and background colours were updated using JavaScript.";
    }
  </script>

</body>
</html>
